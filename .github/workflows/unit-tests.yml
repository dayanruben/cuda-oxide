---
name: unit-tests

# Runs as a job of the top-level CI workflow (.github/workflows/ci.yml),
# which is the single push/pull_request entry point. Concurrency is governed
# by CI's own group, so this workflow declares none of its own.
on:
  workflow_call:

permissions:
  contents: read

jobs:
  rust-unit-tests:
    name: cargo test -p ${{ matrix.package }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        # Each entry must be runnable on a stock `ubuntu-latest` runner — i.e.
        # no live GPU. `needs_cuda: true` installs the CUDA toolkit for build-
        # time bindgen (every crate that transitively depends on
        # `cuda-bindings` needs `cuda.h` to compile). `test_args` overrides
        # the default `--all-targets`, used by `cuda-core` to skip its
        # GPU-only `tests/vmm_p2p.rs` integration test.
        #
        # Crates intentionally not in this matrix:
        #   * `cuda-bindings` — generated sys bindings covered transitively.
        #   * `fuzzer` — differential-testing infra with no unit tests.
        #   * `rustc-codegen-cuda` — its own [workspace] that links against
        #     `rustc-private` dylibs; covered by the dedicated clippy job.
        include:
          - package: cuda-intrinsics-gen
          - package: cuda-intrinsics
          - package: llvm-export
          - package: dialect-mir
          - package: dialect-nvvm
          - package: mir-importer
          # Includes a real llc -> ptxas spine-kernel validation.
          - package: cuda-oxide-codegen
            needs_cuda: true
          - package: mir-lower
          - package: mir-transforms
          - package: nvvm-transforms
          - package: oxide-artifacts
          - package: reserved-oxide-symbols
          # launch_requires_unsafe trybuild fixture dev-depends on
          # cuda-host/cuda-core, which transitively pull cuda-bindings
          - package: cuda-macros
            needs_cuda: true
          # trybuild compile-fail suite for ThreadIndex / DisjointSlice safety
          - package: cuda-device
          # Runtime CUDA compiler/linker discovery and file-identity checks;
          # live-toolkit tests remain explicitly ignored on stock runners.
          - package: libnvvm-sys
          - package: nvjitlink-sys
          # pure-Rust kernel-launch helpers + tcgen05 tiling tables
          - package: cuda-host
            needs_cuda: true
          # cargo subcommand wrapper; pure Rust, no CUDA toolkit required.
          # Running it on a runner with NO toolkit installed is the
          # regression gate for issue #87.
          - package: cargo-oxide
          # async DeviceOperation pipeline; transitively pulls cuda-bindings
          - package: cuda-async
            needs_cuda: true
          # CUDA driver wrappers; `--lib` skips the GPU-only VMM/P2P
          # integration test in `tests/vmm_p2p.rs`.
          - package: cuda-core
            needs_cuda: true
            test_args: --lib

    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Install CUDA toolkit
        if: matrix.needs_cuda
        uses: Jimver/cuda-toolkit@v0.2.35
        id: cuda-toolkit
        with:
          cuda: "13.1.1"
          method: network
          sub-packages: '["nvcc", "cudart-dev"]'
          non-cuda-sub-packages: '["libcurand-dev"]'

      - name: Install LLVM 21 (llc/opt for the NVPTX backend)
        if: matrix.package == 'cuda-oxide-codegen'
        run: |
          set -euo pipefail
          source /etc/os-release
          sudo install -d -m 0755 /etc/apt/keyrings
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key \
            | sudo tee /etc/apt/keyrings/apt-llvm-org.asc >/dev/null
          echo "deb [signed-by=/etc/apt/keyrings/apt-llvm-org.asc] https://apt.llvm.org/${VERSION_CODENAME}/ llvm-toolchain-${VERSION_CODENAME}-21 main" \
            | sudo tee /etc/apt/sources.list.d/llvm-21.list
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends llvm-21
          llc-21 --version | head -2
          opt-21 --version | head -2

      - name: Run crate unit tests
        env:
          CUDA_TOOLKIT_PATH: ${{ steps.cuda-toolkit.outputs.CUDA_PATH }}
        run: |
          sysroot="$(rustc --print sysroot)"
          export LIBRARY_PATH="${sysroot}/lib:${LIBRARY_PATH:-}"
          export LD_LIBRARY_PATH="${sysroot}/lib:${LD_LIBRARY_PATH:-}"

          # cuda-bindings emits `cargo:rustc-link-lib=dylib=cuda`, and the
          # linker stamps the stub's SONAME (`libcuda.so.1`) into the test
          # binary's DT_NEEDED. The CUDA dev sub-packages only ship the
          # link-time stub named `libcuda.so`, with no `libcuda.so.1` alias.
          # Binaries that actually reference `cu*` symbols (cuda-core,
          # cuda-async) keep the NEEDED entry and fail to load at runtime
          # on a GPU-less runner. Binaries whose `cu*` calls were pruned by
          # `--as-needed` (e.g. cuda-host's tests) load fine without it.
          # Create a writable shadow with the `libcuda.so.1` filename
          # pointing at the stub, and prepend it to LD_LIBRARY_PATH. The
          # stub returns errors for any real driver call, which is fine
          # because the unit tests selected here never invoke one.
          if [ -n "${CUDA_TOOLKIT_PATH:-}" ] && [ -f "${CUDA_TOOLKIT_PATH}/lib64/stubs/libcuda.so" ]; then
            stub_shadow="${RUNNER_TEMP}/libcuda-stub"
            mkdir -p "${stub_shadow}"
            ln -sf "${CUDA_TOOLKIT_PATH}/lib64/stubs/libcuda.so" "${stub_shadow}/libcuda.so.1"
            export LD_LIBRARY_PATH="${stub_shadow}:${LD_LIBRARY_PATH}"
          fi

          cargo test -p ${{ matrix.package }} ${{ matrix.test_args || '--all-targets' }}

      # End-to-end proof for issue #87: on this runner there is no CUDA
      # toolkit and no driver, yet doctor must build, load, and reach its
      # checks (it exits 1 here because nvcc/cuda.h are missing, which is
      # exactly the diagnosis it exists to print).
      - name: cargo oxide doctor reaches its checks without the CUDA toolkit
        if: matrix.package == 'cargo-oxide'
        run: |
          set -uo pipefail
          out="$(cargo run -p cargo-oxide -- doctor 2>&1)" || true
          printf '%s\n' "${out}"
          printf '%s\n' "${out}" | grep -q "CUDA headers (cuda.h)"

  generated-intrinsics:
    name: generated intrinsics are current and ABI-compatible
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Clone repository with ABI history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install rustfmt for the pinned nightly
        run: rustup component add rustfmt

      - name: Check generated intrinsic outputs
        run: cargo run -p cuda-intrinsics-gen -- check

      - name: Probe every generated LLVM-NVPTX route
        run: |
          # Stock runners do not carry the recorded CUDA 13.3 ptxas binary.
          # This still checks the pinned llc identity and exact emitted PTX.
          cargo run -p cuda-intrinsics-gen -- probe --all --skip-terminal

      - name: Check append-only intrinsic ABI ledger
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base_ref="${{ github.event.pull_request.base.sha }}"
          else
            before="${{ github.event.before }}"
            zero="0000000000000000000000000000000000000000"
            if [ -n "${before}" ] && [ "${before}" != "${zero}" ] && git cat-file -e "${before}^{commit}"; then
              base_ref="${before}"
            elif git rev-parse --verify HEAD^ >/dev/null 2>&1; then
              base_ref="HEAD^"
            else
              base_ref="HEAD"
            fi
          fi
          cargo run -p cuda-intrinsics-gen -- check-abi-history --base-ref "${base_ref}"
